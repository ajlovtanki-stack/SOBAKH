name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        # Use quotes to handle the space in the folder name
        run: pnpm install --frozen-lockfile
        working-directory: "./university-quest (1)"

      - name: Build client-side application
        run: pnpm run build
        working-directory: "./university-quest (1)"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Path to the build output inside the subfolder
          publish_dir: "./university-quest (1)/client/dist/public"
